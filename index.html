<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CalculusSolver + SLaNg — Project Explorer. An ML system that learns to solve calculus by predicting SLaNg operations."
    />
    <title>CalculusSolver + SLaNg — Project Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: #080b14;
        /* Prevent layout shift from scrollbar appearing */
        overflow-y: scroll;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #080b14;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }

      /* Selection color */
      ::selection {
        background: #6366f130;
        color: #f1f5f9;
      }

      /* Focus ring for keyboard nav */
      :focus-visible {
        outline: 2px solid #6366f1;
        outline-offset: 2px;
        border-radius: 4px;
      }

      /* Responsive: hide desktop nav on small screens, show hamburger */
      @media (max-width: 680px) {
        /* Hide desktop nav */
        nav > div:last-of-type:not(.mobile-menu-btn) {
          display: none !important;
        }
        /* Show hamburger */
        .mobile-menu-btn {
          display: flex !important;
        }
        /* Hide subtitle in brand */
        .nav-subtitle {
          display: none !important;
        }
      }

      /* Responsive: single-column grids on small screens */
      @media (max-width: 640px) {
        div[style*="grid-template-columns: repeat(2"] {
          grid-template-columns: 1fr !important;
        }
        div[style*="grid-template-columns: repeat(3"] {
          grid-template-columns: 1fr !important;
        }
        div[style*="padding: 44px 32px"] {
          padding: 28px 18px 48px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
