<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CalculusSolver + SLaNg — Project Explorer. An ML system that learns to solve calculus by predicting SLaNg operations."
    />
    <title>CalculusSolver + SLaNg — Project Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <!-- KaTeX — math rendering for the Live Demo solver widget -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
      crossorigin="anonymous"
    ></script>
    <style>
      :root {
        --bg-base: #06080f;
        --bg-surface: #0b0e1a;
        --bg-raised: #0f1422;
        --bg-hover: #141929;
        --border: #1c2438;
        --border-light: #222d42;
        --text-primary: #eff3ff;
        --text-secondary: #8b97b8;
        --text-muted: #3d4d6a;
        --accent-violet: #7c6fff;
        --accent-cyan: #22d3ee;
        --accent-amber: #f59e0b;
        --accent-red: #ef4444;
        --accent-green: #10b981;
        --accent-purple: #c084fc;
        --font-sans: "Space Grotesk", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 16px;
        --nav-h: 60px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg-base);
        font-family: var(--font-sans);
        overflow-y: scroll;
        /* Subtle grid texture */
        background-image:
          linear-gradient(rgba(124, 111, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(124, 111, 255, 0.03) 1px, transparent 1px);
        background-size: 48px 48px;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-base);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--border-light);
      }

      /* Selection */
      ::selection {
        background: rgba(124, 111, 255, 0.28);
        color: var(--text-primary);
      }

      /* Focus ring */
      :focus-visible {
        outline: 2px solid var(--accent-violet);
        outline-offset: 3px;
        border-radius: var(--radius-sm);
      }

      /* Responsive nav */
      @media (max-width: 700px) {
        nav > div:last-of-type:not(.mobile-menu-btn) {
          display: none !important;
        }
        .mobile-menu-btn {
          display: flex !important;
        }
        .nav-subtitle {
          display: none !important;
        }
      }

      @media (max-width: 640px) {
        div[style*="grid-template-columns: repeat(2"] {
          grid-template-columns: 1fr !important;
        }
        div[style*="grid-template-columns: repeat(3"] {
          grid-template-columns: 1fr !important;
        }
        div[style*="padding: 48px 36px"] {
          padding: 28px 18px 52px !important;
        }
      }

      /* Fade-in animation for page content */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .page-content {
        animation: fadeUp 0.35s ease both;
      }

      /* Animated underline for active nav item */
      @keyframes slideIn {
        from {
          transform: scaleX(0);
        }
        to {
          transform: scaleX(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
